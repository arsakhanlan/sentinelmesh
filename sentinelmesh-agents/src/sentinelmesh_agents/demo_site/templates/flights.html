{% extends "base.html" %}
{% block title %}Flights — SkyNest Travel{% endblock %}
{% block content %}
<section class="border-b border-slate-200 bg-white">
  <div class="mx-auto max-w-6xl px-4 py-8">
    <h1 class="font-display text-2xl font-bold md:text-3xl">Flights from Bangalore</h1>
    <p class="mt-1 text-slate-500">{{ flights|length }} departures today · prices per traveller</p>
  </div>
</section>
<section class="mx-auto max-w-6xl px-4 py-10">
  <div class="grid grid-cols-1 gap-4">
    {% for f in flights %}{% include "_flight_card.html" %}{% endfor %}
  </div>
</section>
{% endblock %}
