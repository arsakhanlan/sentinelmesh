<footer class="mt-20 border-t border-slate-200 bg-white">
  <div class="mx-auto flex max-w-6xl flex-col items-start gap-4 px-4 py-10 text-sm text-slate-500 md:flex-row md:items-center">
    <div class="flex items-center gap-2">
      <span class="grid h-8 w-8 place-items-center rounded-lg bg-brand-600 text-white">✈</span>
      <span class="font-display font-bold text-ink-900">SkyNestTravel</span>
    </div>
    <p class="md:ml-4">Demo property for SentinelMesh — every AI action here is inspected in real time.</p>
    {# Tiny outbox status pill. Refreshes every 4s. Surfaces the transactional
       outbox actually doing work without the user needing to open devtools. #}
    <div x-data="{ s: { delivered: 0, pending: 0, failed: 0 } }"
         x-init="
           const tick = async () => {
             try {
               const r = await fetch('/api/outbox/stats', { cache: 'no-store' });
               if (r.ok) s = await r.json();
             } catch (_) { /* offline — ignore */ }
           };
           tick(); setInterval(tick, 4000);
         "
         class="md:ml-auto flex items-center gap-2 rounded-full bg-slate-100 px-3 py-1.5 text-xs font-medium text-slate-600"
         title="Booking events drained via the transactional outbox">
      <span class="grid h-2 w-2 place-items-center rounded-full"
            :class="s.pending > 0 ? 'bg-amber-400 animate-pulse' : 'bg-emerald-500'"></span>
      Outbox <span class="font-semibold text-ink-900" x-text="s.delivered"></span> delivered
      <template x-if="s.pending > 0">
        <span>· <span class="font-semibold text-amber-700" x-text="s.pending"></span> pending</span>
      </template>
    </div>
    <a href="{{ soc_url }}" target="_blank"
       class="rounded-full border border-slate-300 px-4 py-2 font-semibold text-ink-900 transition hover:border-brand-600 hover:text-brand-600">
      Open SentinelMesh SOC →
    </a>
  </div>
</footer>
