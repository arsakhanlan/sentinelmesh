<header class="sticky top-0 z-40 glass border-b border-slate-200/70" x-data="{ menu: false }">
  <nav class="mx-auto flex max-w-6xl items-center gap-4 px-4 py-3">
    <a href="/" class="flex items-center gap-2">
      <span class="grid h-9 w-9 place-items-center rounded-xl bg-brand-600 text-white shadow-card">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h20M12 2a15 15 0 0 1 0 20M12 2a15 15 0 0 0 0 20"/></svg>
      </span>
      <span class="font-display text-lg font-extrabold tracking-tight">SkyNest<span class="text-brand-600">Travel</span></span>
    </a>

    <!-- Desktop nav -->
    <div class="ml-2 hidden items-center gap-1 text-sm font-medium text-slate-600 md:flex">
      <a href="/hotels" class="rounded-lg px-3 py-2 hover:bg-slate-100 hover:text-ink-900">Hotels</a>
      <a href="/flights" class="rounded-lg px-3 py-2 hover:bg-slate-100 hover:text-ink-900">Flights</a>
      <a href="/hotels#deals" class="rounded-lg px-3 py-2 hover:bg-slate-100 hover:text-ink-900">Deals</a>
    </div>

    <div class="ml-auto flex items-center gap-2">
      <button onclick="window.dispatchEvent(new CustomEvent('open-concierge'))"
              class="hidden items-center gap-1.5 rounded-full bg-ink-900 px-4 py-2 text-sm font-semibold text-white transition hover:bg-ink-800 sm:flex">
        <span>✨</span> AI Concierge
      </button>
      <!-- Mobile burger -->
      <button @click="menu = !menu" aria-label="Menu"
              class="grid h-10 w-10 place-items-center rounded-lg border border-slate-200 text-ink-900 md:hidden">
        <svg x-show="!menu" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        <svg x-show="menu" x-cloak width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M6 18L18 6"/></svg>
      </button>
    </div>
  </nav>

  <!-- Mobile menu drawer -->
  <div x-show="menu" x-cloak x-transition.opacity class="border-t border-slate-200 bg-white md:hidden">
    <div class="mx-auto flex max-w-6xl flex-col px-4 py-2 text-sm">
      <a href="/hotels"      class="rounded-lg px-3 py-3 font-medium text-ink-900 hover:bg-slate-100">Hotels</a>
      <a href="/flights"     class="rounded-lg px-3 py-3 font-medium text-ink-900 hover:bg-slate-100">Flights</a>
      <a href="/hotels#deals"class="rounded-lg px-3 py-3 font-medium text-ink-900 hover:bg-slate-100">Deals</a>
      <button @click="menu = false; window.dispatchEvent(new CustomEvent('open-concierge'))"
              class="mb-2 mt-2 flex items-center justify-center gap-1.5 rounded-full bg-ink-900 px-4 py-2.5 text-sm font-semibold text-white">
        <span>✨</span> AI Concierge
      </button>
    </div>
  </div>
</header>
<style>[x-cloak]{display:none!important}</style>
