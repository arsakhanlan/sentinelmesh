# Activated when SPRING_PROFILES_ACTIVE=docker (used in docker-compose).
# Overrides the localhost defaults to point at the named compose services.

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/sentinelmesh
  data:
    redis:
      host: redis
      port: 6379

logging:
  level:
    com.sentinelmesh: DEBUG
